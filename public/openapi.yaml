openapi: 3.0.3
info:
  title: RestaurantAI-Brigade API
  version: 1.0.0
servers:
  - url: /
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
paths:
  /api/register:
    post:
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name: { type: string }
                email: { type: string }
                password: { type: string }
                dietary_tags:
                  type: array
                  items:
                    type: string
                    enum: [vegan, no_sugar, no_cholesterol, gluten_free, no_lactose]
      responses:
        "201": { description: Created }
  /api/login:
    post:
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        "200": { description: OK }
  /api/logout:
    post:
      tags: [Auth]
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: OK }
  /api/me:
    get:
      tags: [Auth]
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: OK }
  /api/profile:
    get:
      tags: [Profile]
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: OK }
    put:
      tags: [Profile]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dietary_tags]
              properties:
                dietary_tags:
                  type: array
                  items:
                    type: string
                    enum: [vegan, no_sugar, no_cholesterol, gluten_free, no_lactose]
      responses:
        "200": { description: OK }
  /api/categories:
    get:
      tags: [Categories]
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: OK }
    post:
      tags: [Categories]
      security: [{ bearerAuth: [] }]
      description: Admin only
      responses:
        "201": { description: Created }
  /api/categories/{category}:
    get:
      tags: [Categories]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: category
          required: true
          schema: { type: integer }
      responses:
        "200": { description: OK }
    put:
      tags: [Categories]
      security: [{ bearerAuth: [] }]
      description: Admin only
      parameters:
        - in: path
          name: category
          required: true
          schema: { type: integer }
      responses:
        "200": { description: OK }
    delete:
      tags: [Categories]
      security: [{ bearerAuth: [] }]
      description: Admin only
      parameters:
        - in: path
          name: category
          required: true
          schema: { type: integer }
      responses:
        "200": { description: OK }
  /api/categories/{category}/plates:
    get:
      tags: [Categories]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: category
          required: true
          schema: { type: integer }
      responses:
        "200": { description: OK }
  /api/plates:
    get:
      tags: [Plates]
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: OK }
    post:
      tags: [Plates]
      security: [{ bearerAuth: [] }]
      description: Admin only
      responses:
        "201": { description: Created }
  /api/plates/{plate}:
    get:
      tags: [Plates]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: plate
          required: true
          schema: { type: integer }
      responses:
        "200": { description: OK }
  /api/ingredients:
    get:
      tags: [Ingredients]
      security: [{ bearerAuth: [] }]
      description: Admin only
      responses:
        "200": { description: OK }
    post:
      tags: [Ingredients]
      security: [{ bearerAuth: [] }]
      description: Admin only
      responses:
        "201": { description: Created }
  /api/recommendations/analyze/{plate}:
    post:
      tags: [Recommendations]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: plate
          required: true
          schema: { type: integer }
      responses:
        "202": { description: Accepted (processing) }
  /api/recommendations:
    get:
      tags: [Recommendations]
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: OK }
  /api/recommendations/{plate}:
    get:
      tags: [Recommendations]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: plate
          required: true
          schema: { type: integer }
      responses:
        "200": { description: OK }
  /api/admin/stats:
    get:
      tags: [Admin]
      security: [{ bearerAuth: [] }]
      description: Admin only
      responses:
        "200": { description: OK }

